{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6">
        <div class="card p-4 border-danger">
            <div class="card-body text-center">
                <i class="fa-solid fa-circle-exclamation text-danger fs-1 mb-4 animate-pulse"></i>
                <h2 class="mb-3">¿Eliminar usuario?</h2>
                <p class="text-secondary fs-5 mb-4">
                    Está a punto de eliminar permanentemente al usuario: <strong class="text-white">{{ user_to_delete.username }}</strong>.
                </p>
                
                <div class="alert alert-danger mb-4 text-start">
                    <i class="fa-solid fa-circle-info me-2"></i>
                    Esta acción no se puede deshacer y el usuario perderá acceso inmediato al sistema.
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <button type="submit" class="btn btn-danger px-4 py-2">
                            <i class="fa-solid fa-trash-can me-2"></i>Eliminar usuario
                        </button>
                        <a href="{% url 'users_list' %}" class="btn btn-secondary px-4 py-2">
                            <i class="fa-solid fa-xmark me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
